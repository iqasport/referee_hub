<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <title><%= htmlWebpackPlugin.options.title %></title>
    <link rel="icon" type="image/png" href="/images/favicon.ico">
    <link rel="stylesheet" href="/management_hub.css">
    <link rel="stylesheet" href="/management_hub_app.css">
    <% const baseUrl = (process.env.BASE_URL || '').replace(/\/+$/, ''); %>
    <% htmlWebpackPlugin.files.js.forEach(function(file) { %>
      <script defer src="<%= baseUrl %>/<%= file %>"></script>
    <% }) %>
  </head>
  <body>
    <div id="main-app"></div>
  </body>
</html>
